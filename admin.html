<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ROMEO ADMIN | لوحة الإدارة</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    :root {
      --bg: #07111f;
      --card: #101b2d;
      --primary: #f6c84c;
      --secondary: #4ecdc4;
      --danger: #ff6b6b;
      --text: #f8fafc;
      --muted: #8e9ab3;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 10px 35px rgba(0,0,0,0.25);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
    body { background: linear-gradient(135deg, #07111f 0%, #0f172a 100%); color: var(--text); min-height: 100vh; }
    .shell { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 18px 22px; background: rgba(16,27,45,0.9); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .title { font-size: 1.2rem; font-weight: 800; }
    .title span { color: var(--primary); }
    .top-actions { display: flex; gap: 10px; }
    button { border: none; border-radius: 12px; padding: 10px 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-primary { background: var(--primary); color: #101b2d; }
    .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-danger { background: var(--danger); color: white; }
    button:hover { transform: translateY(-1px); }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 18px; }
    .card { background: rgba(16,27,45,0.95); border: 1px solid var(--border); border-radius: 18px; padding: 18px; box-shadow: var(--shadow); }
    .card h3 { font-size: 1rem; margin-bottom: 8px; color: var(--primary); }
    .card p { color: var(--muted); font-size: 0.95rem; }
    .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .section-head h2 { font-size: 1.05rem; }
    .item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .item .meta strong { display: block; margin-bottom: 3px; }
    .item .meta span { color: var(--muted); font-size: 0.9rem; }
    .actions { display: flex; gap: 8px; }
    .icon-btn { width: 38px; height: 38px; border-radius: 10px; display: grid; place-items: center; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.72); justify-content: center; align-items: center; padding: 20px; z-index: 1000; }
    .modal.open { display: flex; }
    .modal-card { width: min(620px, 100%); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; box-shadow: var(--shadow); }
    label { display: block; margin: 10px 0 6px; color: var(--primary); font-size: 0.95rem; }
    input, textarea, select { width: 100%; padding: 11px 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 12px; color: var(--text); outline: none; }
    textarea { min-height: 90px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .footer-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }
    .status { color: var(--secondary); font-size: 0.92rem; margin-top: 10px; }
    @media (max-width: 780px) { .grid { grid-template-columns: 1fr; } .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="title">ROMEO <span>ADMIN</span></div>
      <div class="top-actions">
        <button class="btn-secondary" onclick="loadData()"><i class="fa-solid fa-rotate-right"></i> تحديث</button>
        <button class="btn-primary" onclick="saveData()"><i class="fa-solid fa-floppy-disk"></i> حفظ</button>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h3>المدرسين</h3>
        <p id="teachersCount">0 مدرس</p>
      </div>
      <div class="card">
        <h3>المحاضرات</h3>
        <p id="videosCount">0 فيديو</p>
      </div>
      <div class="card">
        <h3>الأكواد</h3>
        <p id="codesCount">0 كود</p>
      </div>
    </div>

    <div class="card">
      <div class="section-head">
        <h2>إدارة المدرسين</h2>
        <button class="btn-primary" onclick="openModal('teacher')"><i class="fa-solid fa-plus"></i> إضافة مدرس</button>
      </div>
      <div id="teachersList"></div>
    </div>

    <div class="card" style="margin-top: 16px;">
      <div class="section-head">
        <h2>إدارة الفيديوهات</h2>
        <button class="btn-primary" onclick="openModal('video')"><i class="fa-solid fa-video"></i> إضافة فيديو</button>
      </div>
      <div id="videosList"></div>
    </div>

    <div class="card" style="margin-top: 16px;">
      <div class="section-head">
        <h2>إدارة أكواد التفعيل</h2>
        <button class="btn-primary" onclick="openModal('code')"><i class="fa-solid fa-key"></i> إضافة كود</button>
      </div>
      <div id="codesList"></div>
    </div>

    <p class="status" id="statusBox">جاهز للاتصال بملف JSON المحلي.</p>
  </div>

  <div class="modal" id="modal">
    <div class="modal-card">
      <div class="section-head">
        <h2 id="modalTitle">إضافة</h2>
        <button class="btn-secondary" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const apiUrl = '/api/data';
    const state = { data: { allowed_keys: {}, videos: [], teachers: [] }, mode: null, editingId: null };

    function setStatus(message) {
      document.getElementById('statusBox').textContent = message;
    }

    function ensureStructure() {
      if (!state.data || typeof state.data !== 'object') state.data = { allowed_keys: {}, videos: [], teachers: [] };
      if (!state.data.allowed_keys || typeof state.data.allowed_keys !== 'object') state.data.allowed_keys = {};
      if (!Array.isArray(state.data.videos)) state.data.videos = [];
      if (!Array.isArray(state.data.teachers)) state.data.teachers = [];
    }

    async function loadData() {
      setStatus('جارٍ تحميل البيانات...');
      try {
        const response = await fetch(apiUrl + '?t=' + Date.now());
        if (!response.ok) throw new Error('تعذر الوصول إلى الخادم');
        const data = await response.json();
        state.data = data;
        ensureStructure();
        render();
        setStatus('تم تحميل البيانات من ملف JSON بنجاح.');
      } catch (error) {
        console.error(error);
        setStatus('تعذر الاتصال بالخادم المحلي. تأكد من تشغيله أولاً.');
      }
    }

    async function saveData() {
      ensureStructure();
      setStatus('جارٍ حفظ البيانات...');
      try {
        const response = await fetch(apiUrl, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state.data)
        });
        if (!response.ok) throw new Error('فشل الحفظ');
        setStatus('تم حفظ البيانات إلى ملف JSON بنجاح.');
        await loadData();
      } catch (error) {
        console.error(error);
        setStatus('حدث خطأ أثناء حفظ البيانات.');
      }
    }

    function render() {
      ensureStructure();
      document.getElementById('teachersCount').textContent = `${state.data.teachers.length} مدرس`;
      document.getElementById('videosCount').textContent = `${state.data.videos.length} فيديو`;
      document.getElementById('codesCount').textContent = `${Object.keys(state.data.allowed_keys || {}).length} كود`;

      renderTeachers();
      renderVideos();
      renderCodes();
    }

    function renderTeachers() {
      const box = document.getElementById('teachersList');
      if (!state.data.teachers.length) { box.innerHTML = '<div class="item"><div class="meta"><strong>لا توجد مدرسين</strong><span>أضف مدرسًا جديدًا</span></div></div>'; return; }
      box.innerHTML = state.data.teachers.map(t => `
        <div class="item">
          <div class="meta">
            <strong>${t.name}</strong>
            <span>${t.subject}</span>
          </div>
          <div class="actions">
            <button class="icon-btn btn-secondary" onclick="openModal('teacher', ${t.id})"><i class="fa-solid fa-pen"></i></button>
            <button class="icon-btn btn-danger" onclick="deleteTeacher(${t.id})"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function renderVideos() {
      const box = document.getElementById('videosList');
      if (!state.data.videos.length) { box.innerHTML = '<div class="item"><div class="meta"><strong>لا توجد محاضرات</strong><span>أضف فيديو جديد</span></div></div>'; return; }
      box.innerHTML = state.data.videos.map(v => `
        <div class="item">
          <div class="meta">
            <strong>${v.title}</strong>
            <span>${v.teacherName || 'عام'}</span>
          </div>
          <div class="actions">
            <button class="icon-btn btn-secondary" onclick="openModal('video', ${v.id})"><i class="fa-solid fa-pen"></i></button>
            <button class="icon-btn btn-danger" onclick="deleteVideo(${v.id})"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function renderCodes() {
      const box = document.getElementById('codesList');
      const codes = Object.entries(state.data.allowed_keys || {});
      if (!codes.length) { box.innerHTML = '<div class="item"><div class="meta"><strong>لا توجد أكواد</strong><span>أضف كودًا جديدًا</span></div></div>'; return; }
      box.innerHTML = codes.map(([phone, token]) => `
        <div class="item">
          <div class="meta">
            <strong>${phone}</strong>
            <span>${token}</span>
          </div>
          <div class="actions">
            <button class="icon-btn btn-danger" onclick="deleteCode('${phone}')"><i class="fa-solid fa-trash"></i></button>
          </div>
        </div>
      `).join('');
    }

    function openModal(mode, id = null) {
      state.mode = mode;
      state.editingId = id;
      const modal = document.getElementById('modal');
      const title = document.getElementById('modalTitle');
      const body = document.getElementById('modalBody');
      title.textContent = mode === 'teacher' ? 'إضافة/تعديل مدرس' : mode === 'video' ? 'إضافة/تعديل فيديو' : 'إضافة/تعديل كود';

      if (mode === 'teacher') {
        const item = state.data.teachers.find(t => t.id === id) || {};
        body.innerHTML = `
          <label>اسم المدرس</label>
          <input id="tName" value="${item.name || ''}" />
          <label>المادة</label>
          <input id="tSubject" value="${item.subject || ''}" />
          <label>رابط الصورة</label>
          <input id="tImg" value="${item.img || ''}" />
          <label>الوصف</label>
          <textarea id="tDesc">${item.desc || ''}</textarea>
          <div class="footer-actions">
            <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
            <button class="btn-primary" onclick="submitTeacher()">حفظ</button>
          </div>`;
      } else if (mode === 'video') {
        const item = state.data.videos.find(v => v.id === id) || {};
        body.innerHTML = `
          <label>عنوان الفيديو</label>
          <input id="vTitle" value="${item.title || ''}" />
          <label>رابط الفيديو أو iframe</label>
          <input id="vUrl" value="${item.url || item.stream || ''}" />
          <label>اسم المدرس</label>
          <input id="vTeacherName" value="${item.teacherName || ''}" />
          <div class="footer-actions">
            <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
            <button class="btn-primary" onclick="submitVideo()">حفظ</button>
          </div>`;
      } else {
        const phone = state.editingId ? state.editingId : '';
        const token = state.data.allowed_keys[phone] || '';
        body.innerHTML = `
          <label>رقم الهاتف</label>
          <input id="cPhone" value="${phone}" />
          <label>رمز التفعيل</label>
          <input id="cToken" value="${token}" />
          <div class="footer-actions">
            <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
            <button class="btn-primary" onclick="submitCode()">حفظ</button>
          </div>`;
      }
      modal.classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
      document.getElementById('modalBody').innerHTML = '';
    }

    function submitTeacher() {
      const name = document.getElementById('tName').value.trim();
      const subject = document.getElementById('tSubject').value.trim();
      const img = document.getElementById('tImg').value.trim();
      const desc = document.getElementById('tDesc').value.trim();
      if (!name || !subject) return setStatus('يرجى ملء الاسم والمادة');
      const teacher = { id: state.editingId || Date.now(), name, subject, img, desc };
      if (state.editingId) {
        state.data.teachers = state.data.teachers.map(t => t.id === state.editingId ? teacher : t);
      } else {
        state.data.teachers.push(teacher);
      }
      closeModal();
      saveData();
    }

    function submitVideo() {
      const title = document.getElementById('vTitle').value.trim();
      const url = document.getElementById('vUrl').value.trim();
      const teacherName = document.getElementById('vTeacherName').value.trim();
      if (!title || !url) return setStatus('يرجى كتابة عنوان الفيديو والرابط');
      const video = { id: state.editingId || Date.now(), title, url, teacherName, stream: url };
      if (state.editingId) {
        state.data.videos = state.data.videos.map(v => v.id === state.editingId ? video : v);
      } else {
        state.data.videos.push(video);
      }
      closeModal();
      saveData();
    }

    function submitCode() {
      const phone = document.getElementById('cPhone').value.trim();
      const token = document.getElementById('cToken').value.trim();
      if (!phone || !token) return setStatus('يرجى إدخال الهاتف والرمز');
      state.data.allowed_keys[phone] = token;
      closeModal();
      saveData();
    }

    function deleteTeacher(id) {
      state.data.teachers = state.data.teachers.filter(t => t.id !== id);
      saveData();
    }

    function deleteVideo(id) {
      state.data.videos = state.data.videos.filter(v => v.id !== id);
      saveData();
    }

    function deleteCode(phone) {
      delete state.data.allowed_keys[phone];
      saveData();
    }

    window.addEventListener('DOMContentLoaded', () => {
      loadData();
    });
  </script>
</body>
</html>
